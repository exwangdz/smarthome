
-
  feature: 公众号模块
  story: 获取鉴权码接口
  title: 验证获取鉴权码成功
  request:
    method: get
    url: https://api.weixin.qq.com/cgi-bin/token
    params:
      grant_type: client_credential
      appid: wx8a9de038e93f77ab
      secret: 8326fc915928dee3165720c910effb86

  extract:
    access_token: [json, '$.access_token', 0]
    expires_in: [json, '$.expires_in', 0]   # 注意引号

  validate:
    equals:
      断言状态码为200: [200, status_code]
      断言expires_in相等: [7200, expires_in]   # 注意引号和去掉空格
    contains:
      - [access_token, text]                # 列表的列表，每个元素是二元列表
