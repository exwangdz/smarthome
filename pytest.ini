
[pytest]
#配置常用运行参数
addopts = -vs --alluredir=./reports/allure-results --clean-alluredir
#-n=2（多线程执行用例） -x(只要有一个用例失败就会停止运行)--reruns=2(失败用例重跑)
#--maxfail=2(有两个失败就会停止运行)   -k"user"(根据用例字符串user去选择运行)
#配置测试用例的位置
testpaths=./testcases
#配置模块名的规则
python_files = test_*.py
#配置类的规则
python_classes =Test*
#配置测试用例方法的规则
python_functions =test_*
#基础路径设置
# base_url="http://192.169.92"
#创建标记
markers =
  smoke: 冒烟用例
  order: 下单模块
 #把测试用例打标记
 @pytest.mark.order
 #在pytest.ini中加入配置运行参数
 addopts= -vs -m "smoke or order"#只运行冒烟和下单模块的测试用例

 #日志配置
log_file = ./logs/frame.log
 #日志级别(DEBUG调试,INFO信息,WARNING警告,ERROR错误,CRITICAL严重)
log_file_level = DEBUG
#日志格式
log_file_format = %(asctime)s %(levelname)s %(filename)s %(funcName)s %(lineno)d %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S


#基础路径
[base_url]
itrade_sv_url: https://sv-reg.tx-tech.com/itrade/services/auth/user/login
mtrade_sv_url: https://sv-reg.tx-tech.com/mtrade/services/auth/user/login